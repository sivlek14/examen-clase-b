name: Deploy to GitHub Pages

# Despliega el sitio estático en GitHub Pages usando el flujo oficial de Actions.
# Reemplaza el despliegue "desde rama" (legacy), cuyo workflow interno corría
# sobre el runtime Node.js 20 (en deprecación). Estas acciones usan Node.js 24.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue concurrente; no cancela uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact (sitio estático en la raíz)
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
